<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#140810" />
<title>Ebin Raj — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#140810;--acc:#fb7185;--acc2:#fb923c;--pink:#f472b6;--text:#fdeff1;--muted:#d3b8c1;--glass:rgba(255,255,255,.06);--brd:rgba(255,255,255,.13);--grad:linear-gradient(120deg,#fb923c,#fb7185,#f472b6)}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{max-width:100%;overflow-x:hidden}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(40px + env(safe-area-inset-top)) 22px calc(40px + env(safe-area-inset-bottom))}
  .aurora{position:fixed;inset:0;z-index:-1;overflow:hidden}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
  .b1{width:380px;height:380px;background:#be123c;top:-120px;left:-90px}
  .b2{width:340px;height:340px;background:#ea580c;bottom:-120px;right:-80px}
  .wrap{width:100%;max-width:440px;text-align:center}
  .avatar{width:96px;height:96px;border-radius:50%;margin:0 auto 18px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;font-size:34px;color:#20080f}
  h1{font-family:'Sora';font-weight:800;font-size:30px;letter-spacing:-.02em}
  .tag{color:var(--acc);font-weight:600;margin-top:6px;font-size:15px}
  .award{display:inline-block;margin-top:14px;background:var(--glass);border:1px solid var(--brd);padding:7px 15px;border-radius:999px;font-size:13px;color:#ffd98a}
  .links{margin-top:30px;display:flex;flex-direction:column;gap:14px}
  a.link{display:flex;align-items:center;gap:14px;padding:17px 20px;border-radius:16px;background:var(--glass);border:1px solid var(--brd);backdrop-filter:blur(12px);color:var(--text);text-decoration:none;font-weight:600;font-size:16px;transition:transform .15s,background .15s}
  a.link:active{transform:scale(.98)}
  a.link:hover{background:rgba(255,255,255,.11)}
  a.primary{background:var(--grad);color:#20080f;border-color:transparent}
  .ic{width:26px;text-align:center;font-size:20px;flex:0 0 auto}
  .arw{margin-left:auto;opacity:.6}
  footer{margin-top:28px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>
<div class="wrap">

  <h1>Ebin Raj</h1>

    <a class="link" href="mailto:ebinraj2007@gmail.com"><span class="ic">✉️</span> Email me <span class="arw">↗</span></a>
    <a class="link" href="tel:+971554016987"><span class="ic">📞</span> Call me <span class="arw">↗</span></a>
  </div>

  <footer>+971 55 401 6987 &nbsp;·&nbsp; ebinraj2007@gmail.com</footer>
</div>
</body>
</html>
